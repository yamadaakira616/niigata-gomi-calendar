<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新潟市 ごみカレンダー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;background:#f0f2f5;color:#1a1a1a;min-height:100vh}

/* ヘッダー */
.hdr{background:linear-gradient(135deg,#1a237e 0%,#283593 100%);color:#fff;padding:18px 20px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.hdr-icon{font-size:28px;line-height:1}
.hdr h1{font-size:17px;font-weight:700;letter-spacing:.04em}
.hdr p{font-size:11px;opacity:.75;margin-top:2px}

/* コンテナ */
.wrap{max-width:560px;margin:0 auto;padding:16px}

/* カード */
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.card-label{font-size:12px;font-weight:700;color:#888;letter-spacing:.08em;margin-bottom:10px;text-transform:uppercase}

/* 区選択 */
.ward-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ward-btn{padding:9px 4px;font-size:12px;font-weight:600;border:1.5px solid #dde;border-radius:8px;background:#fff;cursor:pointer;text-align:center;color:#444;transition:all .15s}
.ward-btn:hover{background:#e8eaf6;border-color:#7986cb}
.ward-btn.active{background:#1a237e;border-color:#1a237e;color:#fff}

/* 地区検索 */
.search-box{position:relative;margin-bottom:8px}
.search-box input{width:100%;padding:11px 14px 11px 36px;border:1.5px solid #dde;border-radius:9px;font-size:14px;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:#7986cb}
.search-box::before{content:"🔍";position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.area-list{max-height:240px;overflow-y:auto;border:1.5px solid #dde;border-radius:9px}
.area-item{padding:11px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid #f2f2f2;display:flex;justify-content:space-between;align-items:center;transition:background .1s}
.area-item:last-child{border-bottom:none}
.area-item:hover{background:#f0f2ff}
.area-item.active{background:#e8eaf6}
.area-code{font-size:10px;color:#aaa;flex-shrink:0;margin-left:8px}
.selected-tag{margin-top:10px;padding:8px 12px;background:#e8eaf6;border-radius:8px;font-size:12px;color:#1a237e;font-weight:600;display:none}
.selected-tag::before{content:"✓ "}

/* 今日カード */
.today-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.today-date{font-size:22px;font-weight:800;color:#1a237e;line-height:1.1}
.today-sub{font-size:11px;color:#999;margin-top:3px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:700;color:#fff;letter-spacing:.02em}
.no-col{font-size:14px;color:#bbb;padding:4px 0}

/* カレンダー */
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav-row h2{font-size:17px;font-weight:700}
.nav-btn{padding:6px 14px;border:1.5px solid #dde;border-radius:7px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#444;transition:background .15s}
.nav-btn:hover{background:#f0f2ff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;padding:3px 0;color:#aaa}
.cal-dow:first-child{color:#e53935}
.cal-dow:last-child{color:#1565c0}
.cal-day{min-height:58px;padding:3px 2px;border-radius:5px;background:#fafafa}
.cal-day.today{background:#e8eaf6;outline:2px solid #7986cb}
.cal-day.other{opacity:.2}
.day-n{font-size:11px;font-weight:700;margin-bottom:2px;padding-left:1px}
.cal-sun .day-n{color:#e53935}
.cal-sat .day-n{color:#1565c0}
.tags{display:flex;flex-direction:column;gap:2px}
.tag{font-size:8.5px;padding:1px 3px;border-radius:3px;color:#fff;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* 凡例 */
.legend{margin-top:14px;display:flex;flex-wrap:wrap;gap:7px}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:#555}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

.hidden{display:none}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-icon">🗑️</div>
  <div>
    <h1>新潟市 ごみカレンダー</h1>
    <p>令和8年度（2026年4月〜2027年3月）</p>
  </div>
</div>

<div class="wrap">

  <!-- ① 区を選ぶ -->
  <div class="card">
    <div class="card-label">① 区を選ぶ</div>
    <div class="ward-grid" id="wardGrid"></div>
  </div>

  <!-- ② 地区を選ぶ -->
  <div class="card hidden" id="areaCard">
    <div class="card-label">② 地区・町名を選ぶ</div>
    <div class="search-box">
      <input type="text" id="areaSearch" placeholder="町名で絞り込み…" autocomplete="off">
    </div>
    <div class="area-list" id="areaList"></div>
    <div class="selected-tag" id="selectedTag"></div>
  </div>

  <!-- 今日のごみ -->
  <div class="card hidden" id="todayCard">
    <div class="today-head">
      <div>
        <div class="today-date" id="todayDate"></div>
        <div class="today-sub" id="todayArea"></div>
      </div>
    </div>
    <div class="chips" id="todayChips"></div>
  </div>

  <!-- カレンダー -->
  <div class="card hidden" id="calCard">
    <div class="cal-nav-row">
      <button class="nav-btn" id="prevBtn">◀</button>
      <h2 id="calTitle"></h2>
      <button class="nav-btn" id="nextBtn">▶</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="legend" id="legend"></div>
  </div>

</div>

<script src="gomi-data.js"></script>
<script>
(function(){
  const COLORS={
    "燃やすごみ":"#e53935","プラマーク容器包装":"#1565c0",
    "飲食用缶":"#00838f","ペットボトル":"#00acc1",
    "飲食用・化粧品びん":"#c2185b","古紙類":"#ef6c00",
    "枝・葉・草":"#388e3c","特定5品目":"#7b1fa2","燃やさないごみ":"#757575"
  };
  const ICONS={
    "燃やすごみ":"🔥","プラマーク容器包装":"♻️","飲食用缶":"🥫",
    "ペットボトル":"🧴","飲食用・化粧品びん":"🍶","古紙類":"📰",
    "枝・葉・草":"🌿","特定5品目":"🪣","燃やさないごみ":"🗑️"
  };
  const SHORT={
    "燃やすごみ":"燃やすごみ","プラマーク容器包装":"プラマーク",
    "飲食用缶":"飲食缶","ペットボトル":"PET","飲食用・化粧品びん":"びん",
    "古紙類":"古紙","枝・葉・草":"枝葉草","特定5品目":"特定5品目","燃やさないごみ":"燃やさないごみ"
  };

  const todayStr=(()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
  const DAYS=['日','月','火','水','木','金','土'];

  let selectedWard='', selectedRegionId=null, selectedAreaName='';
  let calYear=new Date().getFullYear(), calMonth=new Date().getMonth()+1;

  function clr(el){while(el.firstChild)el.removeChild(el.firstChild)}

  /* ─── 区ボタン描画 ─── */
  const wardGrid=document.getElementById('wardGrid');
  const wards=Object.keys(GOMI_DATA.areas).sort();
  wards.forEach(w=>{
    const btn=document.createElement('button');
    btn.className='ward-btn'; btn.textContent=w;
    btn.addEventListener('click',()=>onWardClick(w,btn));
    wardGrid.appendChild(btn);
  });

  function onWardClick(ward,btn){
    document.querySelectorAll('.ward-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selectedWard=ward;
    document.getElementById('areaSearch').value='';
    document.getElementById('areaCard').classList.remove('hidden');
    renderAreaList('');
  }

  /* ─── 地区リスト ─── */
  const areaSearch=document.getElementById('areaSearch');
  const areaListEl=document.getElementById('areaList');
  areaSearch.addEventListener('input',()=>renderAreaList(areaSearch.value.trim()));

  function renderAreaList(q){
    const src=GOMI_DATA.areas[selectedWard]||[];
    const filtered=q?src.filter(a=>a.n.includes(q)):src;
    clr(areaListEl);
    filtered.forEach(a=>{
      const item=document.createElement('div');
      item.className='area-item'+(a.r===selectedRegionId&&a.n===selectedAreaName?' active':'');
      const nm=document.createElement('span'); nm.textContent=a.n;
      const cd=document.createElement('span'); cd.className='area-code'; cd.textContent=a.c;
      item.appendChild(nm); item.appendChild(cd);
      item.addEventListener('click',()=>selectArea(a.r,a.n));
      areaListEl.appendChild(item);
    });
  }

  function selectArea(rid,areaName){
    selectedRegionId=rid; selectedAreaName=areaName;
    const tag=document.getElementById('selectedTag');
    tag.textContent=areaName; tag.style.display='block';
    renderAreaList(areaSearch.value.trim());
    localStorage.setItem('gomi_v3',JSON.stringify({ward:selectedWard,rid,areaName}));
    showCalendar();
  }

  /* ─── 表示 ─── */
  function showCalendar(){
    document.getElementById('todayCard').classList.remove('hidden');
    document.getElementById('calCard').classList.remove('hidden');
    renderToday();
    renderCalendar(calYear,calMonth);
  }

  function renderToday(){
    const sch=GOMI_DATA.schedules[String(selectedRegionId)]||{};
    const types=sch[todayStr]||[];
    const d=new Date(todayStr+'T00:00:00');
    document.getElementById('todayDate').textContent=
      d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+DAYS[d.getDay()]+'）';
    document.getElementById('todayArea').textContent=selectedWard+' '+selectedAreaName;
    const chips=document.getElementById('todayChips');
    clr(chips);
    if(types.length===0){
      const el=document.createElement('span'); el.className='no-col'; el.textContent='本日は収集なし';
      chips.appendChild(el);
    } else {
      types.forEach(t=>{
        const el=document.createElement('span'); el.className='chip';
        el.style.background=COLORS[t]||'#888';
        el.textContent=(ICONS[t]||'')+' '+t;
        chips.appendChild(el);
      });
    }
  }

  function renderCalendar(year,month){
    document.getElementById('calTitle').textContent=year+'年'+month+'月';
    const sch=GOMI_DATA.schedules[String(selectedRegionId)]||{};
    const grid=document.getElementById('calGrid');
    clr(grid);
    DAYS.forEach(d=>{
      const el=document.createElement('div'); el.className='cal-dow'; el.textContent=d;
      grid.appendChild(el);
    });
    const firstDay=new Date(year,month-1,1).getDay();
    const lastDate=new Date(year,month,0).getDate();
    const used=new Set();
    for(let i=0;i<firstDay;i++){
      const el=document.createElement('div'); el.className='cal-day other'; grid.appendChild(el);
    }
    for(let d=1;d<=lastDate;d++){
      const dow=new Date(year,month-1,d).getDay();
      const el=document.createElement('div');
      el.className='cal-day'+(dow===0?' cal-sun':dow===6?' cal-sat':'');
      const ds=year+'-'+String(month).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      if(ds===todayStr)el.classList.add('today');
      const num=document.createElement('div'); num.className='day-n'; num.textContent=d;
      el.appendChild(num);
      const types=sch[ds]||[];
      if(types.length){
        const tags=document.createElement('div'); tags.className='tags';
        types.forEach(t=>{
          used.add(t);
          const tag=document.createElement('div'); tag.className='tag';
          tag.style.background=COLORS[t]||'#888';
          tag.title=t; tag.textContent=(ICONS[t]||'')+(SHORT[t]||t);
          tags.appendChild(tag);
        });
        el.appendChild(tags);
      }
      grid.appendChild(el);
    }
    const lg=document.getElementById('legend'); clr(lg);
    used.forEach(t=>{
      const it=document.createElement('div'); it.className='leg';
      const dot=document.createElement('div'); dot.className='leg-dot'; dot.style.background=COLORS[t]||'#888';
      const lb=document.createElement('span'); lb.textContent=t;
      it.appendChild(dot); it.appendChild(lb); lg.appendChild(it);
    });
  }

  document.getElementById('prevBtn').addEventListener('click',()=>{
    calMonth--; if(calMonth<1){calMonth=12;calYear--;} renderCalendar(calYear,calMonth);
  });
  document.getElementById('nextBtn').addEventListener('click',()=>{
    calMonth++; if(calMonth>12){calMonth=1;calYear++;} renderCalendar(calYear,calMonth);
  });

  /* ─── 前回選択を復元 ─── */
  const saved=localStorage.getItem('gomi_v3');
  if(saved){
    try{
      const {ward,rid,areaName}=JSON.parse(saved);
      const btn=Array.from(document.querySelectorAll('.ward-btn')).find(b=>b.textContent===ward);
      if(btn){
        btn.click();
        selectedRegionId=rid; selectedAreaName=areaName;
        const tag=document.getElementById('selectedTag');
        tag.textContent=areaName; tag.style.display='block';
        renderAreaList('');
        showCalendar();
      }
    }catch(e){}
  }
})();
</script>
</body>
</html>
